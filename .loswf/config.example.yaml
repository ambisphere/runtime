# loswf2 factory configuration — copy to `.loswf/config.yaml` in any host repo and edit.
# Schema reference: specs/SRS.md §4.7

version: 2
project: <repo-name>
repo: <owner>/<repo-name>
branch: main

description: >
  One paragraph describing what this repo does and what kind of work the
  factory should handle for it. Injected into every agent's context.

# Per-role speed/effort tier — runtime-neutral. Runtime adapters resolve
# each tier to a concrete model locally (Claude: fast→haiku, default→sonnet,
# deep→opus; Codex: maps tiers to model_reasoning_effort low/medium/high).
# Tiers: fast | default | deep. Absent roles inherit the runtime default.
# See docs/designs/runtime-neutral-config-migration.md for the mapping tables.
model_policy:
  intake: default
  planner: default
  plan_reviewer: default
  builder: default
  reviewer: default
  escalation: default
  harvester: default
  curator: default
  architect: default
  designer: default
  scout: fast
  red_team: default
  documenter: default

# Validation commands the builder and reviewer MUST run before declaring done.
# Order matters — fastest first, slowest last (fail fast).
validate:
  - name: lint
    run: "npm run lint"
  - name: typecheck
    run: "npm run typecheck"
  - name: test
    run: "npm test"
  - name: build
    run: "npm run build"

# Repo-specific rules injected into agent contexts. Keep tight — every guardrail
# is a token tax on every invocation.
guardrails:
  - "Never push directly to main — all changes go through a branch and PR."
  - "Never use --no-verify on git commits."
  - "All new source files must have corresponding tests."

# Language/runtime conventions agents reference when generating code.
standards:
  language: TypeScript
  runtime: Node 20
  test_runner: vitest
  module_system: ESM
  formatting: prettier (no linter rule enforcement)

# Curator scoping — issues matching these are skipped by intake.
curator:
  ignore_labels: [question, wontfix, duplicate, dependencies, invalid]
  ignore_authors: ["dependabot[bot]", "renovate[bot]", "github-actions[bot]"]
  # Minimum hours between curator invocations from adws/adw_sweep.sh. The sweep
  # checks mtime of .loswf/state/curator.last_run against this value.
  cadence_hours: 1

# Required semantic code index (see specs/SRS.md §4.7). Factory refuses to run without it.
code_search:
  collection: <repo-name>-symbols
  paths: [src/, specs/, docs/]
  exclude: ["*.test.ts", "node_modules/", "dist/"]
  provider: qdrant-ollama
  qdrant_url: http://127.0.0.1:6333
  ollama_url: http://127.0.0.1:11434
  embed_model: mxbai-embed-large

# Worktree concurrency cap for sweep parallelism.
sweep:
  max_concurrent_builds: 3
  cycle_interval_minutes: 5
  # Short sleep between cycles while any issue is still queued in an active
  # phase. Default 30. Set 0 to skip sleep while busy.
  min_interval_sec: 30
  # Native TTS announcements via adws/tts_announce.sh. Silent by default;
  # set LOSWF_SPEAK=1 in the environment for ad-hoc audible announcements.
  speak: false
  # Declarative phase sequence — the order adw_sweep.sh walks each cycle.
  # Schema (design: docs/designs/curator-harvester-sequencing-remediation.md §4):
  #   name              — stable identifier, also the label phase in most cases.
  #   kind              — subagent | bash | command.
  #   agent             — subagent name (when kind=subagent).
  #   mode              — subagent mode flag (e.g. curator triage vs steward).
  #   handler           — bash function to dispatch (when kind=bash).
  #   command           — slash command to run (when kind=command).
  #   enabled           — false disables the step without deleting it.
  #   parallel          — { max: N } allows N concurrent worktrees for this phase.
  #   idle_gated        — run only when earlier phases did no work this cycle.
  #   cadence_hours     — minimum hours between runs (uses .loswf/state timestamps).
  #   counts_as_work    — whether a successful run counts toward sweep "progress".
  #                       idle_gated steps MUST have counts_as_work: false (design §5.1).
  sequence:
    # Disabled because loswf-curator currently defines safe-ops, proposals,
    # escalation, and steward behavior, but no explicit triage-mode contract.
    # Tracking rationale: draft plan #110.
    - { name: triage,            kind: subagent, agent: curator, mode: triage,  enabled: false, counts_as_work: true }
    - { name: intake,            kind: subagent, agent: intake,                 counts_as_work: true }
    - { name: investigating,     kind: subagent, agent: investigator,           counts_as_work: true }
    - { name: planning,          kind: subagent, agent: planner,   counts_as_work: true }
    - { name: plan-review,       kind: subagent, agent: plan-reviewer,          counts_as_work: true }
    - { name: decomposing,       kind: subagent, agent: decomposer,             counts_as_work: true }
    - { name: building,          kind: subagent, agent: builder,   parallel: { max: 3 }, counts_as_work: true }
    - { name: awaiting-children, kind: bash,     handler: promote_rollup_if_ready, counts_as_work: true }
    - { name: review,            kind: subagent, agent: reviewer,               counts_as_work: true }
    - { name: ship,              kind: command,  command: /loswf:ship,          counts_as_work: true }
    - { name: rollup,            kind: subagent, agent: documenter,             counts_as_work: true }
    - { name: escalation,        kind: subagent, agent: curator,   mode: escalation, counts_as_work: true }
    - { name: harvest,           kind: subagent, agent: harvester, idle_gated: true,  counts_as_work: false }
    - { name: curator-steward,   kind: subagent, agent: curator, mode: steward, idle_gated: true, cadence_hours: 1, counts_as_work: false }

# Grounded external review — optional OpenAI Responses API call from the
# plan-reviewer agent that cross-checks plans against current public
# knowledge. Gated on OPENAI_API_KEY and the `pyyaml` soft-dep. Silently
# no-ops if unavailable. See specs/SRS.md §4.11.
grounded_review:
  enabled: true
  model: gpt-5
  timeout_seconds: 120
  marker_prefix: "loswf:grounded"
  budget:
    feature: 2
    task: 1
    bug: 1
    chore: 0
    refactor: 1
    docs: 0
